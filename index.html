<!DOCTYPE html>

<title>Smuel Official Bio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f2a18, #050807);
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 520px;
    padding: 30px 20px;
    text-align: center;
}

.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #00ff88;
    object-fit: cover;
    box-shadow: 0 0 25px #00ff8855;
}

h1 {
    margin: 15px 0 5px;
    font-size: 34px;
    font-weight: 800;
    color: #00ff88;
}

.subtitle {
    color: #ff7a18;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 30px;
}

.card {
    background: rgba(0, 255, 136, 0.08);
    border: 1px solid rgba(0, 255, 136, 0.25);
    padding: 15px 18px;
    border-radius: 14px;
    margin: 12px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #ff7a18;
    box-shadow: 0 0 15px rgba(255, 122, 24, 0.3);
}

.card span {
    font-weight: 600;
}

.icon {
    width: 26px;
    height: 26px;
}

.footer {
    margin-top: 35px;
    color: #00ff88;
    letter-spacing: 4px;
    font-weight: 700;
}
</style>
</head>
